{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-spell-check" style="color:#9B93E8;"></i> Proofreading Assistant</h2>
    <p>Get AI‑powered suggestions to improve spelling, grammar, and academic style.</p>
</div>

<!-- Layout en une seule colonne -->
<div class="proofreading-single-col">
    <!-- Éditeur -->
    <div class="editor-container card">
        <div class="editor-header">
            <h3><i class="fas fa-edit" style="color:#F6A9C0;"></i> Your Document</h3>
            <div class="upload-area">
                <label for="file-upload-proof" class="btn btn-upload btn-sm"><i class="fas fa-cloud-upload-alt"></i> Upload</label>
                <input type="file" id="file-upload-proof" accept=".txt,.docx,.pdf" style="display:none;">
                <span id="upload-status-proof" class="upload-status"></span>
            </div>
        </div>
        <textarea id="editor-text-proof" rows="10" placeholder="Write or paste your text here..." style="min-height: 200px;">{{ editor_text }}</textarea>
        
        <div style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap;">
            <button id="proofread-btn" class="btn btn-primary"><i class="fas fa-wand-magic"></i> Proofread Document</button>
            
            <!-- Nouveau formulaire de téléchargement robuste -->
            <form action="{{ url_for('download_document') }}" method="POST" onsubmit="document.getElementById('hidden-text-proof').value = document.getElementById('editor-text-proof').value;">
                <input type="hidden" name="current_text" id="hidden-text-proof">
                <button type="submit" class="btn btn-download"><i class="fas fa-file-word"></i> Download DOCX</button>
            </form>
        </div>
        
        <!-- Barre de progression -->
        <div id="progress-container" style="display: none; margin-top: 1rem;">
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
            <p id="progress-text" class="progress-text">⏳ Analyzing your document...</p>
        </div>
    </div>

    <!-- Résultat de la relecture (s'affiche en dessous) -->
    <div class="proofreading-result card" id="proofreading-result" style="display: none; margin-top: 1.5rem;">
        <h3><i class="fas fa-check-circle" style="color:#6AB04C;"></i> Revised Version</h3>
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
            <div class="diff-stats" id="diff-stats"></div>
            <button id="toggle-original-btn" class="btn btn-secondary btn-sm">Show Original</button>
        </div>
        <div id="diff-display" style="background: #fcf9f5; padding: 0.8rem; border-radius: 16px; border: 1px solid #e8e2d7; max-height: 350px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.4;"></div>
        <div id="original-text-display" style="display: none; white-space: pre-wrap; background: #fcf9f5; padding: 1rem; border-radius: 16px; border: 1px solid #e8e2d7; margin-top: 1rem; min-height: 100px; max-height: 350px; overflow-y: auto; color: #888;"></div>
        <div style="margin-top: 1rem; display: flex; gap: 0.8rem; flex-wrap: wrap;">
            <button id="apply-proofreading" class="btn btn-success"><i class="fas fa-check"></i> Apply Changes</button>
            <button id="discard-proofreading" class="btn btn-secondary">Discard</button>
        </div>
        <!-- Message de succès après application -->
        <div id="apply-success" style="display: none; margin-top: 1rem; padding: 1rem; background: #d4edda; border-radius: 16px; border: 1px solid #c3e6cb; color: #155724;">
            <p style="margin-bottom: 0.5rem;"><i class="fas fa-check-circle" style="color:#155724;"></i> <strong>Changes applied successfully!</strong> Your document has been updated.</p>
        </div>
    </div>
</div>
{% endblock %}
